name: Mobile Native Preflight

on:
  workflow_dispatch:
    inputs:
      prepare_ios_project:
        description: "Preparar proyecto iOS (cap add/sync) sin publicar"
        required: true
        type: boolean
        default: false
      prepare_android_project:
        description: "Preparar proyecto Android (cap add/sync) sin publicar"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  web-mobile-ready:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Mobile preflight checks
        run: |
          cd frontend
          npm run mobile:preflight

      - name: Build web shell
        run: |
          cd frontend
          APP_STAGE="RC" npm run build

      - name: Verify app-link association files in dist
        run: |
          test -f frontend/dist/.well-known/apple-app-site-association
          test -f frontend/dist/.well-known/assetlinks.json

      - name: Upload web mobile-ready artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-shell-dist
          path: frontend/dist
          if-no-files-found: error

  ios-native-prepare:
    if: github.event.inputs.prepare_ios_project == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build and sync iOS native shell
        run: |
          cd frontend
          npm run build
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Upload iOS native project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-project
          path: frontend/ios
          if-no-files-found: error

  android-native-prepare:
    if: github.event.inputs.prepare_android_project == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build and sync Android native shell
        run: |
          cd frontend
          npm run build
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Upload Android native project artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-project
          path: frontend/android
          if-no-files-found: error
