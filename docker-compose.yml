# Liga EDUmind - Docker Compose - SECURED 2025-12-07
# All ports bound to localhost for security

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: liga-edumind-backend-dev
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - /var/www/.secrets/liga_edumind.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_QUEUE_REDIS_URL=redis://redis:6379/2
      - DEBUG=False
    volumes:
      - ./backend:/app
      - backend_uploads:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/ready', timeout=3).read()\"" ]
      interval: 15s
      timeout: 5s
      retries: 3
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Worker de emails (cola arq); --watch recarga al editar el código
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: liga-edumind-worker-dev
    env_file:
      - /var/www/.secrets/liga_edumind.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_QUEUE_REDIS_URL=redis://redis:6379/2
      - DEBUG=False
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "arq", "--check", "app.workers.email_worker.WorkerSettings" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: arq app.workers.email_worker.WorkerSettings --watch /app/app

  db:
    image: postgres:15-alpine@sha256:aa7b1ef595e165f0b780162e3a41edd0a7ed3ea672eb8a0f81615ba725e62bc5
    container_name: liga-edumind-db-dev
    env_file:
      - /var/www/.secrets/liga_edumind.env
    environment:
      - POSTGRES_DB=liga_edumind
      - POSTGRES_USER=liga_edumind
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U liga_edumind -d liga_edumind" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4.6-alpine@sha256:3b73847e72874be07e6657b129a94761662b79bc0f679273757d4218573b2a98
    container_name: liga-edumind-redis-dev
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: liga-edumind-frontend-dev
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - VITE_API_URL=/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data_dev:
  redis_data_dev:
  backend_uploads:
